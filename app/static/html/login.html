<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link
        rel="stylesheet"
        href="/static/css/login.css"
    >

</head>

<body>

    <div class="login-container">

        <h1>Login</h1>

        <form
            action="/login"
            method="post"
        >

            <input
                type="email"
                name="email"
                placeholder="Enter email"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Enter password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <p class="signup-text">
            Don't have an account?
            <a href="/signup">Sign Up</a>
        </p>

    </div>

</body>

</html>
